<svg width="760" height="44" viewBox="0 0 760 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lecia AgentOS typing line</title>
  <desc id="desc">A local animated typewriter line for the huachabobo GitHub profile.</desc>
  <defs>
    <style>
      .line {
        font: 700 22px "SFMono-Regular", "Consolas", "Menlo", "Microsoft YaHei", monospace;
        fill: #CA6C97;
      }
      .cursor {
        fill: #CA6C97;
      }
    </style>
    <clipPath id="clip-1">
      <rect x="238" y="0" width="16" height="44">
        <animate attributeName="width" values="16;16;284;284;0;0" keyTimes="0;0.03;0.16;0.23;0.25;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-2">
      <rect x="188" y="0" width="0" height="44">
        <animate attributeName="width" values="0;0;388;388;0;0" keyTimes="0;0.25;0.41;0.48;0.50;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-3">
      <rect x="90" y="0" width="0" height="44">
        <animate attributeName="width" values="0;0;580;580;0;0" keyTimes="0;0.50;0.66;0.73;0.75;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-4">
      <rect x="190" y="0" width="0" height="44">
        <animate attributeName="width" values="0;0;382;382;0" keyTimes="0;0.75;0.91;0.98;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="760" height="44" rx="22" fill="transparent"/>

  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.23;0.25;1" dur="16s" repeatCount="indefinite"/>
    <text x="238" y="28" class="line" clip-path="url(#clip-1)">Lecia AgentOS builder</text>
    <rect x="254" y="10" width="10" height="26" rx="2" class="cursor">
      <animate attributeName="x" values="254;254;522;522;238;238" keyTimes="0;0.03;0.16;0.23;0.25;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.48;0.50;1" dur="16s" repeatCount="indefinite"/>
    <text x="188" y="28" class="line" clip-path="url(#clip-2)">做可爱、认真、可治理的 AI 系统</text>
    <rect x="188" y="10" width="10" height="26" rx="2" class="cursor">
      <animate attributeName="x" values="188;188;576;576;188;188" keyTimes="0;0.25;0.41;0.48;0.50;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.52;0.73;0.75;1" dur="16s" repeatCount="indefinite"/>
    <text x="90" y="28" class="line" clip-path="url(#clip-3)">self-hosted agent systems, operator-first</text>
    <rect x="90" y="10" width="10" height="26" rx="2" class="cursor">
      <animate attributeName="x" values="90;90;670;670;90;90" keyTimes="0;0.50;0.66;0.73;0.75;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.77;0.98;1" dur="16s" repeatCount="indefinite"/>
    <text x="190" y="28" class="line" clip-path="url(#clip-4)">soft edges · serious systems</text>
    <rect x="190" y="10" width="10" height="26" rx="2" class="cursor">
      <animate attributeName="x" values="190;190;572;572;190" keyTimes="0;0.75;0.91;0.98;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
