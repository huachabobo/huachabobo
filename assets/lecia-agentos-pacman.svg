<svg width="960" height="220" viewBox="0 0 960 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lecia AgentOS tiny arcade</title>
  <desc id="desc">A playful Pac-Man inspired component showing Lecia AgentOS eating backlog across docs, runtime, approvals, and orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="42" y1="28" x2="918" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8FC"/>
      <stop offset="1" stop-color="#F7D9E5"/>
    </linearGradient>
    <linearGradient id="path" x1="144" y1="0" x2="796" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D584A4"/>
      <stop offset="1" stop-color="#C76B92"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="960" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#B56B88" flood-opacity="0.16"/>
    </filter>
    <style>
      .label {
        font: 700 13px "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #A95D7D;
      }
      .title {
        font: 700 30px "Trebuchet MS", "Segoe UI", sans-serif;
        fill: #71394F;
      }
      .body {
        font: 600 16px "Trebuchet MS", "Segoe UI", sans-serif;
        fill: #8B5970;
      }
      .chip {
        font: 700 14px "Trebuchet MS", "Segoe UI", sans-serif;
        fill: #955870;
      }
      .ghostText {
        font: 700 13px "Trebuchet MS", "Segoe UI", sans-serif;
        fill: #FFF6FB;
      }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="28" y="24" width="904" height="172" rx="28" fill="url(#bg)"/>
  </g>
  <rect x="28.75" y="24.75" width="902.5" height="170.5" rx="27.25" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1.5"/>

  <rect x="64" y="52" width="124" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.88"/>
  <text x="126" y="67" class="label" text-anchor="middle" dominant-baseline="middle">tiny arcade</text>

  <text x="64" y="116" class="title">Pac-Man mode</text>
  <text x="64" y="142" class="body">eating backlog across the control plane.</text>

  <g>
    <rect x="64" y="158" width="88" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="108" y="171" class="chip" text-anchor="middle" dominant-baseline="middle">docs</text>
    <rect x="160" y="158" width="104" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.84"/>
    <text x="212" y="171" class="chip" text-anchor="middle" dominant-baseline="middle">runtime</text>
    <rect x="272" y="158" width="112" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.76"/>
    <text x="328" y="171" class="chip" text-anchor="middle" dominant-baseline="middle">approvals</text>
    <rect x="392" y="158" width="136" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.68"/>
    <text x="460" y="171" class="chip" text-anchor="middle" dominant-baseline="middle">orchestration</text>
  </g>

  <g transform="translate(540 42)">
    <rect x="0" y="20" width="344" height="96" rx="24" fill="#8D516A"/>
    <rect x="0.75" y="20.75" width="342.5" height="94.5" rx="23.25" stroke="#FFDCE7" stroke-opacity="0.38" stroke-width="1.5"/>
    <line x1="42" y1="68" x2="302" y2="68" stroke="url(#path)" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 15"/>

    <g>
      <circle cx="118" cy="68" r="6.5" fill="#FFE8F2">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="154" cy="68" r="6.5" fill="#FFE8F2">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="190" cy="68" r="6.5" fill="#FFE8F2">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="226" cy="68" r="6.5" fill="#FFE8F2">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(56 36)">
      <animateTransform attributeName="transform" type="translate" values="56 36;72 36;56 36" dur="2.4s" repeatCount="indefinite"/>
      <path d="M0 32A32 32 0 1 1 0 0L22 16L0 32Z" fill="#FFD96C">
        <animate attributeName="d" dur="0.45s" repeatCount="indefinite"
          values="M0 32A32 32 0 1 1 0 0L22 16L0 32Z;
                  M0 32A32 32 0 1 1 0 0L12 16L0 32Z;
                  M0 32A32 32 0 1 1 0 0L22 16L0 32Z" />
      </path>
      <circle cx="8" cy="8" r="3.4" fill="#71394F"/>
    </g>

    <g transform="translate(258 34)">
      <animateTransform attributeName="transform" type="translate" values="258 34;266 30;258 34" dur="2.1s" repeatCount="indefinite"/>
      <path d="M0 24C0 10.745 10.745 0 24 0C37.255 0 48 10.745 48 24V50H39L33 44L27 50L21 44L15 50L9 44L0 50V24Z" fill="#F6A8C4"/>
      <circle cx="18" cy="22" r="7" fill="#FFF6FB"/>
      <circle cx="30" cy="22" r="7" fill="#FFF6FB"/>
      <circle cx="20" cy="22" r="2.4" fill="#71394F"/>
      <circle cx="32" cy="22" r="2.4" fill="#71394F"/>
      <text x="24" y="70" class="ghostText" text-anchor="middle">bugs</text>
    </g>

    <text x="26" y="102" class="ghostText">operator heartbeat online</text>
  </g>
</svg>
