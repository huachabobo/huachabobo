<svg width="960" height="158" viewBox="0 0 960 158" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Now building terminal bar</title>
  <desc id="desc">A terminal-style status bar showing the current Lecia AgentOS work items: controlled core stability, provider runtime hardening, and operator approval polish.</desc>
  <defs>
    <linearGradient id="shell" x1="38" y1="24" x2="922" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6FB"/>
      <stop offset="1" stop-color="#F8D9E7"/>
    </linearGradient>
    <linearGradient id="header" x1="38" y1="24" x2="922" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFEAF4"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="960" height="158" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#9B5B74" flood-opacity="0.18"/>
    </filter>
    <style>
      .title {
        font: 700 13px "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #91526E;
      }
      .shellTitle {
        font: 700 13px "Trebuchet MS", "Segoe UI", sans-serif;
        fill: #7C4A62;
      }
      .line {
        font: 600 16px "SFMono-Regular", "Consolas", "Menlo", monospace;
        fill: #71394F;
      }
      .muted {
        font: 600 15px "SFMono-Regular", "Consolas", "Menlo", monospace;
        fill: #9A5D76;
      }
      .accent {
        font: 700 15px "SFMono-Regular", "Consolas", "Menlo", monospace;
        fill: #C96B93;
      }
      .ok {
        font: 700 15px "SFMono-Regular", "Consolas", "Menlo", monospace;
        fill: #6A9275;
      }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="28" y="22" width="904" height="114" rx="22" fill="url(#shell)"/>
  </g>
  <rect x="28" y="22" width="904" height="36" rx="22" fill="url(#header)"/>
  <path d="M28 58H932V114C932 126.15 922.15 136 910 136H50C37.8497 136 28 126.15 28 114V58Z" fill="url(#shell)"/>
  <rect x="28.75" y="22.75" width="902.5" height="112.5" rx="21.25" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="1.5"/>

  <circle cx="56" cy="40" r="6.5" fill="#F39AB9"/>
  <circle cx="78" cy="40" r="6.5" fill="#F6C6D8"/>
  <circle cx="100" cy="40" r="6.5" fill="#F9E2EC"/>
  <text x="126" y="44" class="shellTitle">now-building.terminal</text>
  <text x="892" y="44" class="title" text-anchor="end">live status</text>

  <text x="56" y="82" class="accent">$</text>
  <text x="76" y="82" class="line">now-building Lecia-AgentOS</text>

  <text x="56" y="108" class="ok">&gt;</text>
  <text x="76" y="108" class="muted">controlled-core · runtime hardening · approval polish</text>

  <rect x="584" y="95" width="9" height="18" rx="2" fill="#C96B93">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
